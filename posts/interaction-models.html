    const STORE_KEY = 'im-post-pw';

    const gate = document.getElementById('gate');
    const card = document.querySelector('.im-gate-card');
    const form = document.getElementById('gate-form');
    const input = document.getElementById('gate-input');
    const errEl = document.getElementById('gate-error');
    const protectedEl = document.getElementById('protected');
    const wrapper = document.getElementById('article-wrapper');
    const footer = document.getElementById('footer');

    const enc = new TextEncoder();
    function b64ToBytes(b64) {
      const bin = atob(b64);
      const u = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
      return u;
    }
    async function deriveKey(pw, salt, iters) {
      const base = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: iters, hash: 'SHA-256' },
        base,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }
    async function decrypt(pw) {
      const key = await deriveKey(pw, b64ToBytes(PAYLOAD.salt), PAYLOAD.iters);
      const buf = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) },
        key,
        b64ToBytes(PAYLOAD.ct)
      );
      return new TextDecoder().decode(buf);
    }

    function reveal(html) {
      wrapper.innerHTML = html;
      gate.remove();
      protectedEl.hidden = false;
      footer.hidden = false;
      document.title = 'Thoughts on Interaction Models \u2013 Medha Venkatapathy';
      initToc();
    }

    async function attempt(pw, fromStore) {
      try {
        const html = await decrypt(pw);
        try { sessionStorage.setItem(STORE_KEY, pw); } catch (e) {}
        reveal(html);
        return true;
      } catch (e) {
        if (!fromStore) {
          errEl.textContent = 'Wrong password';
          card.classList.remove('im-shake');
          // reflow to restart the shake animation
          void card.offsetWidth;
          card.classList.add('im-shake');
          input.select();
        }
        return false;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = input.value;
      if (!pw) return;
      input.disabled = true;
      await attempt(pw, false);
      input.disabled = false;
      input.focus();
    });

    // Auto-unlock if already entered this session; otherwise focus the field
    (function () {
      let pw = null;
      try { pw = sessionStorage.getItem(STORE_KEY); } catch (e) {}
      if (pw) { attempt(pw, true); }
      else { try { input.focus(); } catch (e) {} }
    })();

    // ===== TOC active highlighting (runs after content is injected) =====
    function initToc() {
      const tocLinks = document.querySelectorAll('.article-toc a');
      const headings = [];
      tocLinks.forEach(link => {
        const id = link.getAttribute('href').slice(1);
        const el = document.getElementById(id);
        if (el) headings.push({ el, link });
      });
      function onScroll() {
        let current = headings[0];
        for (const h of headings) {
          if (h.el.getBoundingClientRect().top <= 120) current = h;
        }
        tocLinks.forEach(l => l.classList.remove('toc-active'));
        if (current) current.link.classList.add('toc-active');
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }
  </script>
